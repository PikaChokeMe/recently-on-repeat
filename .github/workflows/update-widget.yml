name: Legacy Manual Single-User Update

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print payload without patching Discord"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update-widget:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run legacy updater
        run: node scripts/update-widget.js
        env:
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}

          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_TIME_RANGE: short_term
          SPOTIFY_LIMIT: "5"

          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          DISCORD_IDENTITY_ID: "0"
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_API_BASE: https://discord.com/api/v9