name = "recently-on-repeat"
main = "src/worker.js"
compatibility_date = "2026-07-06"
workers_dev = true

[assets]
directory = "./docs"
binding = "ASSETS"

[vars]
PUBLIC_BASE_URL = "https://recently-on-repeat.killspire.workers.dev"
DISCORD_CLIENT_ID = "1523612953063063662"
SPOTIFY_CLIENT_ID = "707df3c059a04b3fae13ce1962cce9bb"
DISCORD_API_BASE = "https://discord.com/api/v9"
SPOTIFY_TIME_RANGE = "short_term"
SPOTIFY_LIMIT = "5"
DISCORD_IDENTITY_ID = "0"
EXPERIMENTAL_RECENT_REPEATS = "1"
RECENT_REPEAT_HALF_LIFE_DAYS = "2.5"
RECENT_PLAY_RETENTION_DAYS = "30"
RECENT_PLAY_MAX_EVENTS = "5000"
SPOTIFY_LIMIT = "5"

[[d1_databases]]
binding = "DB"
database_name = "listen-on-repeat"
database_id = "cc18cd4c-e9cb-4bfd-bfeb-e350128142f5"

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[triggers]
crons = ["17 * * * *"]
